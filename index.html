<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5"/>
  <title>Buat Kamu 🌸</title>
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.19/dist/sweetalert2.all.min.js"></script>

  <style>

@font-face {
  font-family: 'ProductSans';
  src: url('https://raw.githubusercontent.com/XYZax404/zaxfile/main/ProductSans-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
    /* ── RESET ── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    /* ── TOKENS ── */
    :root {
      --bg:        #080808;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.10);
      --glow-r:    #ff4060;
      --glow-c:    #39c6d6;
      --text:      #f0ede8;
      --muted:     rgba(240,237,232,0.45);
      --font-d: 'ProductSans', sans-serif;
--font-b: 'ProductSans', sans-serif;
      --radius:    16px;
      --ease:      cubic-bezier(.25,.46,.45,.94);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PARTICLE STARS ── */
    .stars-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(57,198,214,.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,64,96,.05) 0%, transparent 70%);
    }
    .stars-bg::before, .stars-bg::after {
      content:'';
      position:absolute; inset:0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 15%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,.1) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 55%, rgba(255,255,255,.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,.15) 0%, transparent 100%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    .stars-bg::after {
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 40%, rgba(57,198,214,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(255,64,96,.12) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 88% 70%, rgba(255,255,255,.18) 0%, transparent 100%);
      animation-delay: -3s;
    }
    @keyframes twinkle {
      0%   { opacity: .6; }
      100% { opacity: 1; }
    }

    /* ══════════════════════════════════════
       PAGE 1 — HALAMAN UTAMA
    ══════════════════════════════════════ */
    #page1 {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px;
      gap: 0;
    }

    /* Envelope / surat */
    #suratin {
      cursor: pointer;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 0 0 rgba(57,198,214,0);
      transition: transform .3s var(--ease), box-shadow .3s var(--ease);
      will-change: transform;
      overflow: hidden;
      margin-bottom: 28px;
    }
    #suratin:hover {
      transform: scale(1.06);
      box-shadow: 0 0 28px rgba(57,198,214,.25), 0 0 60px rgba(57,198,214,.1);
    }
    #suratin img {
      width: 180px; height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(57,198,214,.4));
    }

    #ket {
      font-family: var(--font-b);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      transition: opacity .4s;
    }

    /* Card konten */
    #Content {
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 36px 28px 32px;
      text-align: center;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .7s var(--ease), transform .7s var(--ease);
      display: none;
    }
    #Content.visible {
      opacity: 1; transform: translateY(0);
    }

    /* Stiker gif */
 #bq > div {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
}

#fotoakhir {
  width: 160px;
  height: 160px;
  object-fit: contain;
  display: none;
}
    #fotoakhir2, #fotoakhir3, #fotoakhir4, #fotoakhir5 { display: none; }

    /* Kalimat utama */
    #kalimat {
      font-family: var(--font-d);
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 300;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 6px;
      position: relative;
    }
    #pesanTolak {
      font-family: var(--font-b);
      font-size: 13px;
      font-weight: 300;
      color: var(--glow-r);
      opacity: 0;
      transform: scale(0);
      transition: all .5s var(--ease);
      position: absolute;
      left: 50%; transform: translateX(-50%) scale(0);
      white-space: nowrap;
      bottom: -24px;
    }
    #pesanTolak.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #kalimatb, #kalimatc {
      font-family: var(--font-b);
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 6px;
    }

    /* Jawaban-jawaban */
    #kalimat2, #kalimat2b, #kalimat3 {
      font-family: var(--font-d);
      font-size: clamp(22px, 5.5vw, 29px);
      font-weight: 300;
      color: var(--text);
      margin-bottom: 4px;
      display: none;
    }
    #kalimatb2, #kalimatc2, #kalimatb3, #kalimatc3 {
      font-family: var(--font-b);
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 6px;
      display: none;
    }
    #ctimer {
      font-family: var(--font-d);
      font-size: 28px;
      font-weight: 400;
      color: var(--glow-r);
      text-shadow: 0 0 12px rgba(255,64,96,.5);
    }
    #kalimatc3 b {
      color: var(--glow-r);
    }

    /* Tombol-tombol */
    #Tombol {
      display: none; /* shown by JS */
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
      opacity: 0;
      transform: scale(.92);
      transition: opacity .5s var(--ease), transform .5s var(--ease);
    }
    #Tombol.visible { opacity: 1; transform: scale(1); }

    #By, #Bn, #Bn2 {
      display: inline-flex;
      align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 50px;
      font-family: var(--font-b);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: .04em;
      text-decoration: none;
      transition: all .25s var(--ease);
      user-select: none;
    }
   #By {
  padding: 12px 32px;
  background: linear-gradient(135deg, #14757a, #39c6d6);
box-shadow: 0 0 20px rgba(57,198,214,.3);
  border: 1px solid rgba(10,180,255,.5);
  color: #fff;
}
#By:hover {
  background: linear-gradient(135deg, #1a9198, #4dd8e8);
box-shadow: 0 0 32px rgba(57,198,214,.5);
  transform: translateY(-1px);
}
    #Bn {
      padding: 12px 24px;
      background: transparent;
      border: 1.5px solid rgba(57,198,214,.4);
color: rgba(57,198,214,.7);
    }
    #Bn:hover { border-color: rgba(57,198,214,.9); color: #39c6d6; }
    #Bn2 {
      display: none;
      border-radius: 50px;
      border: 1.5px solid rgba(10,180,255,.4);
      background: transparent;
      color: rgba(10,180,255,.7);
      font-size: 13px;
    }

    /* ══════════════════════════════════════
       PAGE 2 — FLOWER SCENE
    ══════════════════════════════════════ */
    #flower-container {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: none;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }
    #flower-container.active { display: flex; }

    /* Subtle ambient glow on flower page */
    #flower-container::before {
      content:'';
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(57,198,214,.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,64,96,.04) 0%, transparent 70%);
    }

    /* Teks di flower page */
    .flower-text {
      position: absolute;
      top: 14%;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-d);
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 300;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      letter-spacing: .02em;
      animation: floatText 4s ease-in-out infinite;
      z-index: 20;
    }
    .flower-text span {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 1px solid rgba(240,237,232,.5);
      width: 0;
      animation:
        typing 5s steps(28, end) 0.5s forwards,
        blink-caret .7s step-end 5.5s 5,
        hide-caret 0s 9s forwards;
    }
    @keyframes floatText {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }
    @keyframes typing {
      from { width: 0; }
      to   { width: 100%; }
    }
    @keyframes blink-caret {
      50% { border-color: transparent; }
    }
    @keyframes hide-caret {
      to { border-right: none; }
    }

    /* ── NIGHT / STARS on flower page ── */
    .night {
      position: fixed;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      filter: blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, transparent 0%, #080808),
        radial-gradient(ellipse at bottom, #080808, rgba(57,198,214,.08)),
        repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(189deg, black 0px, black 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(148deg, black 0px, black 19px, transparent 19px, transparent 22px),
        linear-gradient(90deg, rgba(0,255,250,.08), rgba(240,240,240,.05));
    }

    /* ── FLOWER ANIMATION (intact, unchanged from original) ── */
    .flowers {
      position: relative;
      transform: scale(0.9);
    }
    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
    }
    .flower--1 { animation: moving-flower-1 5s ease-in-out infinite; }
    .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left var(--fl-speed) 2s backwards; }
    .flower--2 { left:50%; transform:rotate(20deg); animation: moving-flower-2 6s ease-in-out infinite; }
    .flower--2 .flower__line { height:60vmin; animation-delay:0.6s; }
    .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards; }
    .flower--3 { left:50%; transform:rotate(-15deg); animation: moving-flower-3 4.5s ease-in-out infinite; }
    .flower--3 .flower__line { animation-delay:0.9s; }
    .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards; }

    .flower__leafs { position:relative; animation: blooming-flower 2s backwards; }
    .flower__leafs--1 { animation-delay:1.1s; }
    .flower__leafs--2 { animation-delay:1.4s; }
    .flower__leafs--3 { animation-delay:1.7s; }
    .flower__leafs::after {
      content:""; position:absolute; left:0; top:0;
      transform:translate(-50%,-100%);
      width:8vmin; height:8vmin;
      background-color:#6bf0ff; filter:blur(10vmin);
    }
    .flower__leaf {
      position:absolute; bottom:0; left:50%;
      width:8vmin; height:11vmin;
      border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
      background-color:#a7ffee;
      background-image:linear-gradient(to top,#54b8aa,#a7ffee);
      transform-origin:bottom center; opacity:.9;
      box-shadow:inset 0 0 2vmin rgba(255,255,255,.5);
    }
    .flower__leaf--1 { transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform:translate(-50%,-4%) rotateX(40deg); }
    .flower__leaf--3 { transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width:8vmin; height:8vmin;
      transform-origin:bottom left;
      border-radius:4vmin 10vmin 4vmin 4vmin;
      transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);
      background-image:linear-gradient(to top,#39c6d6,#a7ffee);
      z-index:1; opacity:.8;
    }
    .flower__white-circle {
      position:absolute; left:-3.5vmin; top:-3vmin;
      width:9vmin; height:4vmin; border-radius:50%;
      background-color:#fff;
    }
    .flower__white-circle::after {
      content:""; position:absolute; left:50%; top:45%;
      transform:translate(-50%,-50%);
      width:60%; height:60%; border-radius:inherit;
      background-image:linear-gradient(90deg,#ffeb12,#ffce00);
    }
    .flower__line {
      height:55vmin; width:1.5vmin;
      background-image:linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,255,.2)),linear-gradient(to top,transparent 10%,#14757a,#39c6d6);
      box-shadow:inset 0 0 2px rgba(0,0,0,.5);
      animation:grow-flower-tree 4s backwards;
    }
    .flower__line__leaf {
      --w:7vmin; --h:calc(var(--w)+2vmin);
      position:absolute; top:20%; left:90%;
      width:var(--w); height:var(--h);
      border-top-right-radius:var(--h); border-bottom-left-radius:var(--h);
      background-image:linear-gradient(to top,rgba(20,117,122,.4),#39c6d6);
    }
    .flower__line__leaf--1 { transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top:45%; transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6 {
      border-top-right-radius:0; border-bottom-left-radius:0;
      border-top-left-radius:var(--h); border-bottom-right-radius:var(--h);
      left:-460%; top:12%; transform:rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top:40%; }
    .flower__line__leaf--5 { top:0; transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(.6); }
    .flower__line__leaf--6 { top:-2%; left:-450%; transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(.6); }

    .flower__light {
      position:absolute; bottom:0; width:1vmin; height:1vmin;
      background-color:#fffb00; border-radius:50%; filter:blur(.2vmin);
      animation:light-ans 4s ease-in-out infinite backwards;
    }
    .flower__light:nth-child(odd) { background-color:#23f0ff; }
    .flower__light--1 { left:-2vmin; animation-delay:1s; }
    .flower__light--2 { left:3vmin; animation-delay:.5s; }
    .flower__light--3 { left:-6vmin; animation-delay:.3s; }
    .flower__light--4 { left:6vmin; animation-delay:.9s; }
    .flower__light--5 { left:-1vmin; animation-delay:1.5s; }
    .flower__light--6 { left:-4vmin; animation-delay:3s; }
    .flower__light--7 { left:3vmin; animation-delay:2s; }
    .flower__light--8 { left:-6vmin; animation-delay:3.5s; }

    .flower__grass {
      --c:#159faa; --line-w:1.5vmin;
      position:absolute; bottom:12vmin; left:-7vmin;
      display:flex; flex-direction:column; align-items:flex-end;
      z-index:20; transform-origin:bottom center;
      transform:rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1 { animation:moving-grass 3.5s ease-in-out infinite; }
    .flower__grass--2 {
      left:2vmin; bottom:10vmin;
      transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity:.8; z-index:0; animation:moving-grass--2 4s ease-in-out infinite;
    }
    .flower__grass--top {
      width:7vmin; height:10vmin; border-top-right-radius:100%;
      border-right:var(--line-w) solid var(--c); transform-origin:bottom center; transform:rotate(-2deg);
    }
    .flower__grass--bottom {
      margin-top:-2px; width:var(--line-w); height:25vmin;
      background-image:linear-gradient(to top,transparent,var(--c));
    }
    .flower__grass__leaf {
      --size:10vmin; position:absolute;
      width:calc(var(--size)*2.1); height:var(--size);
      border-top-left-radius:var(--size); border-top-right-radius:var(--size);
      background-image:linear-gradient(to top,transparent,transparent 30%,var(--c)); z-index:100;
    }
    .flower__grass__leaf--1 { top:-6%; left:30%; --size:6vmin; transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
    .flower__grass__leaf--2 { top:-5%; left:-110%; --size:6vmin; transform:rotate(10deg); animation:growing-grass-ans--2 2s 2.4s linear backwards; }
    .flower__grass__leaf--3 { top:5%; left:60%; --size:8vmin; transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
    .flower__grass__leaf--4 { top:6%; left:-135%; --size:8vmin; transform:rotate(2deg); animation:growing-grass-ans--4 2s 2s linear backwards; }
    .flower__grass__leaf--5 { top:20%; left:60%; --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
    .flower__grass__leaf--6 { top:22%; left:-180%; --size:10vmin; transform:rotate(10deg); animation:growing-grass-ans--6 2s 1.6s linear backwards; }
    .flower__grass__leaf--7 { top:39%; left:70%; --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
    .flower__grass__leaf--8 { top:40%; left:-215%; --size:11vmin; transform:rotate(10deg); animation:growing-grass-ans--8 2s 1.2s linear backwards; }
    .flower__grass__overlay {
      position:absolute; top:-10%; right:0; width:100%; height:100%;
      background-color:rgba(0,0,0,.6); filter:blur(1.5vmin); z-index:100;
    }
    .flower__g-long {
      --w:2vmin; --h:6vmin; --c:#159faa;
      position:absolute; bottom:10vmin; left:-3vmin;
      transform-origin:bottom center; transform:rotate(-30deg) rotateY(-20deg);
      display:flex; flex-direction:column; align-items:flex-end;
      animation:flower-g-long-ans 4s ease-in-out infinite;
    }
    .flower__g-long__top {
      top:calc(var(--h)*-1); width:calc(var(--w)+1vmin); height:var(--h);
      border-top-right-radius:100%; border-right:.7vmin solid var(--c);
      transform:translate(-.7vmin,1vmin);
    }
    .flower__g-long__bottom {
      width:var(--w); height:50vmin; transform-origin:bottom center;
      background-image:linear-gradient(to top,transparent 30%,var(--c));
      box-shadow:inset 0 0 2px rgba(0,0,0,.5);
      clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%);
    }
    .flower__g-right {
      position:absolute; bottom:6vmin; left:-2vmin;
      transform-origin:bottom left; transform:rotate(20deg);
    }
    .flower__g-right .leaf {
      width:30vmin; height:50vmin; border-top-left-radius:100%;
      border-left:2vmin solid #079097;
      background-image:linear-gradient(to bottom,transparent,#080808 60%);
      -webkit-mask-image:linear-gradient(to top,transparent 30%,#079097 60%);
    }
    .flower__g-right--1 { animation:flower-g-right-ans 4s ease-in-out infinite; }
    .flower__g-right--2 { left:5vmin; transform:rotateY(-180deg); animation:flower-g-right-ans--2 5s ease-in-out infinite; }
    .flower__g-right--2 .leaf { height:75vmin; filter:blur(.3vmin); opacity:.8; }
    .flower__g-front {

<script>
  /* ── STATE ── */
  let ftom = 0, ftganti = 0, flag = 1, flagg = 1;
  let pesanwhatsapp = "Aku mau kok jadi pacarmu ><";

  const audio = new Audio(document.getElementById('linkmp3').textContent.trim());

  const swals = Swal.mixin({
    allowOutsideClick: false,
    cancelButtonColor: '#1a6fff',
    background: '#111', color: '#f0ede8',
  });

  /* ── INIT ── */
  window.addEventListener('DOMContentLoaded', () => {
    // Bn2 hidden by default, isi sama dengan Bn
    const Bn2 = document.getElementById('Bn2');
    Bn2.textContent = 'Gamau';
    Bn2.style.display = 'none';
  });

  /* ── GANTI GIF ── */
  function ftmuncul() {
    const el = document.getElementById('fotoakhir');
    const ids = ['fotoakhir','fotoakhir2','fotoakhir3','fotoakhir4','fotoakhir5'];
    if (ftganti > 0) el.src = document.getElementById(ids[ftganti]).src;
    el.style.opacity = '1';
    el.style.transform = 'scale(1)';
  }
  function fthilang() {
    const el = document.getElementById('fotoakhir');
    el.style.transition = 'opacity .5s ease, transform .5s ease';
    el.style.opacity = '0';
    el.style.transform = 'scale(.1)';
  }

  /* ── BUKA SURAT ── */
  function memulai() {
    const suratin = document.getElementById('suratin');
    suratin.classList.add('bounce');
    suratin.style.pointerEvents = 'none';

    setTimeout(() => {
      document.getElementById('ket').style.opacity = '0';

      const content = document.getElementById('Content');
      content.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => content.classList.add('visible')));

      // tampilkan gif
      const foto = document.getElementById('fotoakhir');
      foto.style.display = 'block';
      foto.style.opacity = '0';
      foto.style.transform = 'scale(.1)';
      foto.style.transition = 'opacity .7s ease, transform .7s ease';
      setTimeout(() => ftmuncul(), 300);

      // tampilkan tombol
      setTimeout(() => {
        const T = document.getElementById('Tombol');
        T.style.display = 'flex';
        requestAnimationFrame(() => requestAnimationFrame(() => T.classList.add('visible')));
        ftom = 1;
      }, 600);
    }, 900);
  }

  /* ── MULTIFUNGSI (tombol Mau) ── */
  function multifungsi() {
    if (ftom === 1) diterima();
    if (ftom === 5) menuju();
  }

  async function menuju() {
    await swals.fire('OK! 🎉', 'Kirim pesan ke WhatsApp aku, ya!', 'success');
    window.location = "https://api.whatsapp.com/send?phone=&text=" + encodeURIComponent(pesanwhatsapp);
  }

  /* ── DITOLAK ── */
  function ditolak() {
    if (flagg === 0) return;
    flagg = 0;

    // sembunyikan Bn asli, munculkan Bn2 yang lari-lari
    document.getElementById('Bn').style.display = 'none';
    const Bn2 = document.getElementById('Bn2');
    Bn2.style.cssText = `
      display: inline-flex;
      align-items: center; justify-content: center;
      cursor: pointer;
      width: 80px; height: 36px;
      border-radius: 50px;
      border: 1.5px solid rgba(10,180,255,.5);
      background: transparent;
      color: rgba(10,180,255,.7);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      letter-spacing: .03em;
      position: fixed;
      z-index: 9999;
      transition: border-color .2s;
    `;

    const moveBtn = () => {
      Bn2.style.left = Math.random() * (window.innerWidth - 120) + 'px';
      Bn2.style.top  = Math.random() * (window.innerHeight - 60) + 'px';
    };
    Bn2.onmouseover = moveBtn;
    Bn2.ontouchstart = (e) => { e.preventDefault(); moveBtn(); };
    moveBtn();

    setTimeout(() => { flagg = 1; }, 300);
  }

  function ditolak2() { ditolak(); }

  /* ── DITERIMA ── */
  function diterima() {
    if (flag === 0) return;
    flag = 0; ftom = 0;

    // sembunyikan tombol
    const T = document.getElementById('Tombol');
    T.style.opacity = '0';
    setTimeout(() => { T.style.display = 'none'; }, 400);

    // ganti gif → gif kedua setelah 0.7s
    fthilang();
    setTimeout(() => { ftganti = 1; ftmuncul(); }, 700);

    // langsung ke bunga setelah 2 detik
    setTimeout(() => goFlower(), 2000);
  }

  /* ── GO TO FLOWER PAGE ── */
  function goFlower() {
    const fc = document.getElementById('flower-container');
    fc.style.display = 'flex';
    requestAnimationFrame(() => fc.classList.add('active'));
    audio.play().catch(() => {});
  }
</script>
</body>
