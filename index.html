<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#080808" />
  <title>Buat Kamu 🌸</title>

  <!-- Favicon -->
  <link rel="icon"             type="image/jpeg" href="https://cdn.aceimg.com/qf8z9zfJg.jpg" />
  <link rel="shortcut icon"                      href="https://cdn.aceimg.com/qf8z9zfJg.jpg" />
  <link rel="apple-touch-icon"                   href="https://cdn.aceimg.com/qf8z9zfJg.jpg" />

  <!-- Preconnect font -->
  <link rel="preconnect" href="https://raw.githubusercontent.com" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.19/dist/sweetalert2.all.min.js" defer></script>
</head>

<body>

  <!-- Audio (src dibaca oleh JS) -->
  <audio id="linkmp3" preload="none" style="display:none">https://raw.githubusercontent.com/XYZax404/zaxfile/main/oui%20-%20jeremih%20edit%20audio.m4a</audio>

  <!-- Bintang latar -->
  <div class="stars-bg" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════
       PAGE 1 — HALAMAN UTAMA
  ═══════════════════════════════════ -->
  <div id="page1">

    <!-- Avatar / profil -->
    <div id="suratin" onclick="memulai()" role="button" aria-label="Buka surat">
      <img src="https://cdn.aceimg.com/qf8z9zfJg.jpg" alt="foto profil" draggable="false" />
    </div>

    <!-- Keterangan klik -->
    <p id="ket">✦ klik profil aku ✦</p>

    <!-- Card konten (muncul setelah klik avatar) -->
    <div id="Content">

      <!-- Stiker / gif -->
      <div id="bq">
        <div>
          <img id="fotoakhir"  src="https://cdn.aceimg.com/nfiR7ZhWm.png" alt="stiker" draggable="false" />
          <img id="fotoakhir2" src="https://cdn.aceimg.com/genIVSO5E.png" alt="stiker2" draggable="false" style="display:none" />
        </div>
      </div>

      <!-- Teks utama -->
      <div style="position:relative; margin-bottom: 4px;">
        <p id="kalimat">mau ga jadi pacarku? 🥺</p>
        <span id="pesanTolak">sakit loh nolak gitu 🥺</span>
      </div>

      <p id="kalimatb">aku serius, beneran nanya nih</p>
      <p id="kalimatc"></p>

      <!-- Teks respon: diterima -->
      <p id="kalimat2"></p>
      <p id="kalimatb2"></p>
      <p id="kalimatc2"></p>

      <!-- Teks respon: lanjut -->
      <p id="kalimat2b"></p>

      <!-- Teks respon: timer / final -->
      <p id="kalimat3"></p>
      <p id="kalimatb3"></p>
      <p id="kalimatc3"><span id="ctimer"></span></p>

      <!-- Tombol pilihan -->
      <div id="Tombol">
        <a id="By"  onclick="multifungsi()" role="button">Mau ✨</a>
        <a id="Bn"  onclick="ditolak()"     role="button">Gamau</a>
        <a id="Bn2" onclick="ditolak()"     role="button"></a>
      </div>

    </div><!-- /#Content -->
  </div><!-- /#page1 -->


  <!-- ═══════════════════════════════════
       PAGE 2 — FLOWER SCENE
  ═══════════════════════════════════ -->
  <div id="flower-container" aria-hidden="true">

    <div class="night"></div>

    <p class="flower-text">
      <span>yaudah, ambil nih bwatmu 🙂</span>
    </p>

    <div class="flowers">

      <!-- Bunga 1 -->
      <div class="flower flower--1">
        <div class="flower__leafs flower__leafs--1">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
          <div class="flower__light flower__light--1"></div>
          <div class="flower__light flower__light--2"></div>
          <div class="flower__light flower__light--3"></div>
          <div class="flower__light flower__light--4"></div>
          <div class="flower__light flower__light--5"></div>
          <div class="flower__light flower__light--6"></div>
          <div class="flower__light flower__light--7"></div>
          <div class="flower__light flower__light--8"></div>
        </div>
        <div class="flower__line">
          <div class="flower__line__leaf flower__line__leaf--1"></div>
          <div class="flower__line__leaf flower__line__leaf--2"></div>
          <div class="flower__line__leaf flower__line__leaf--3"></div>
          <div class="flower__line__leaf flower__line__leaf--4"></div>
          <div class="flower__line__leaf flower__line__leaf--5"></div>
          <div class="flower__line__leaf flower__line__leaf--6"></div>
        </div>
      </div>

      <!-- Bunga 2 -->
      <div class="flower flower--2">
        <div class="flower__leafs flower__leafs--2">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
          <div class="flower__light flower__light--1"></div>
          <div class="flower__light flower__light--2"></div>
          <div class="flower__light flower__light--3"></div>
          <div class="flower__light flower__light--4"></div>
          <div class="flower__light flower__light--5"></div>
          <div class="flower__light flower__light--6"></div>
          <div class="flower__light flower__light--7"></div>
          <div class="flower__light flower__light--8"></div>
        </div>
        <div class="flower__line">
          <div class="flower__line__leaf flower__line__leaf--1"></div>
          <div class="flower__line__leaf flower__line__leaf--2"></div>
          <div class="flower__line__leaf flower__line__leaf--3"></div>
          <div class="flower__line__leaf flower__line__leaf--4"></div>
        </div>
      </div>

      <!-- Bunga 3 -->
      <div class="flower flower--3">
        <div class="flower__leafs flower__leafs--3">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
          <div class="flower__light flower__light--1"></div>
          <div class="flower__light flower__light--2"></div>
          <div class="flower__light flower__light--3"></div>
          <div class="flower__light flower__light--4"></div>
          <div class="flower__light flower__light--5"></div>
          <div class="flower__light flower__light--6"></div>
          <div class="flower__light flower__light--7"></div>
          <div class="flower__light flower__light--8"></div>
        </div>
        <div class="flower__line">
          <div class="flower__line__leaf flower__line__leaf--1"></div>
          <div class="flower__line__leaf flower__line__leaf--2"></div>
          <div class="flower__line__leaf flower__line__leaf--3"></div>
          <div class="flower__line__leaf flower__line__leaf--4"></div>
        </div>
      </div>

      <!-- Tanaman panjang -->
      <div class="grow-ans" style="--d:1.2s">
        <div class="flower__g-long">
          <div class="flower__g-long__top"></div>
          <div class="flower__g-long__bottom"></div>
        </div>
      </div>

      <!-- Rumput kiri -->
      <div class="growing-grass">
        <div class="flower__grass flower__grass--1">
          <div class="flower__grass--top"></div>
          <div class="flower__grass--bottom"></div>
          <div class="flower__grass__leaf flower__grass__leaf--1"></div>
          <div class="flower__grass__leaf flower__grass__leaf--2"></div>
          <div class="flower__grass__leaf flower__grass__leaf--3"></div>
          <div class="flower__grass__leaf flower__grass__leaf--4"></div>
          <div class="flower__grass__leaf flower__grass__leaf--5"></div>
          <div class="flower__grass__leaf flower__grass__leaf--6"></div>
          <div class="flower__grass__leaf flower__grass__leaf--7"></div>
          <div class="flower__grass__leaf flower__grass__leaf--8"></div>
          <div class="flower__grass__overlay"></div>
        </div>
      </div>

      <!-- Rumput kanan -->
      <div class="growing-grass">
        <div class="flower__grass flower__grass--2">
          <div class="flower__grass--top"></div>
          <div class="flower__grass--bottom"></div>
          <div class="flower__grass__leaf flower__grass__leaf--1"></div>
          <div class="flower__grass__leaf flower__grass__leaf--2"></div>
          <div class="flower__grass__leaf flower__grass__leaf--3"></div>
          <div class="flower__grass__leaf flower__grass__leaf--4"></div>
          <div class="flower__grass__leaf flower__grass__leaf--5"></div>
          <div class="flower__grass__leaf flower__grass__leaf--6"></div>
          <div class="flower__grass__leaf flower__grass__leaf--7"></div>
          <div class="flower__grass__leaf flower__grass__leaf--8"></div>
          <div class="flower__grass__overlay"></div>
        </div>
      </div>

      <!-- Daun kanan -->
      <div class="grow-ans" style="--d:2.4s">
        <div class="flower__g-right flower__g-right--1"><div class="leaf"></div></div>
      </div>
      <div class="grow-ans" style="--d:2.8s">
        <div class="flower__g-right flower__g-right--2"><div class="leaf"></div></div>
      </div>

      <!-- Daun depan -->
      <div class="grow-ans" style="--d:2.8s">
        <div class="flower__g-front">
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--1"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--2"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--3"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--4"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--5"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--6"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--7"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--8"><div class="flower__g-front__leaf"></div></div>
          <div class="flower__g-front__line"></div>
        </div>
      </div>

      <!-- Daun bawah depan -->
      <div class="grow-ans" style="--d:3.2s">
        <div class="flower__g-fr">
          <div class="leaf"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--1"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--2"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--3"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--4"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--5"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--6"></div>
          <div class="flower__g-fr__leaf flower__g-fr__leaf--7"></div>
        </div>
      </div>

      <!-- Rumput panjang (long-g 0–7) -->
      <div class="long-g long-g--0">
        <div class="grow-ans" style="--d:3.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:2.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:3.4s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--1">
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:3.8s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:4.0s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--2">
        <div class="grow-ans" style="--d:4.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:4.4s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:4.6s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--3">
        <div class="grow-ans" style="--d:4.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:3.0s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--4">
        <div class="grow-ans" style="--d:4.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:3.0s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--5">
        <div class="grow-ans" style="--d:4.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:3.0s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--6">
        <div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:4.4s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:4.6s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:4.8s"><div class="leaf leaf--3"></div></div>
      </div>
      <div class="long-g long-g--7">
        <div class="grow-ans" style="--d:3.0s"><div class="leaf leaf--0"></div></div>
        <div class="grow-ans" style="--d:3.2s"><div class="leaf leaf--1"></div></div>
        <div class="grow-ans" style="--d:3.5s"><div class="leaf leaf--2"></div></div>
        <div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div>
      </div>

    </div><!-- /.flowers -->
  </div><!-- /#flower-container -->

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
