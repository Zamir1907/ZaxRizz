<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5"/>
  <title>Buat Kamu 🌸</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.aceimg.com/qf8z9zfJg.jpg">
  <link rel="shortcut icon" href="https://cdn.aceimg.com/qf8z9zfJg.jpg">
  <link rel="apple-touch-icon" href="https://cdn.aceimg.com/qf8z9zfJg.jpg">
  <link rel="preconnect" href="https://raw.githubusercontent.com">

  <style>

.brutal-shake {
  animation: brutalShake .65s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes brutalShake {
  0% {
    transform: translateX(0) rotate(0deg) scale(1);
    filter: blur(0);
  }
  10% {
    transform: translateX(-8px) rotate(-2deg) scale(1.05);
  }
  20% {
    transform: translateX(8px) rotate(2deg) scale(.98);
  }
  30% {
    transform: translateX(-10px) rotate(-3deg) scale(1.06);
    filter: blur(.5px);
  }
  40% {
    transform: translateX(10px) rotate(3deg) scale(.97);
  }
  55% {
    transform: translateX(-6px) rotate(-1.5deg) scale(1.04);
  }
  70% {
    transform: translateX(6px) rotate(1.5deg) scale(1);
    filter: blur(0);
  }
  100% {
    transform: translateX(0) rotate(0deg) scale(1);
  }
}
    
/* ── FONT ── */
@font-face {
  font-family: 'ProductSans';
  src: url('https://raw.githubusercontent.com/XYZax404/zaxfile/main/ProductSans-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* Hilangkan highlight biru saat ditekan */
* {
    -webkit-tap-highlight-color: transparent;
}

/* Tidak bisa seleksi teks */
* {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

/* Safari iPhone: hilangkan menu Copy/Save */
* {
    -webkit-touch-callout: none;
}

/* Gambar tidak bisa didrag */
img {
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: auto;
}

/* Tombol tidak ada outline saat focus */
button,
a,
input,
textarea {
    outline: none;
}

/* ── DESIGN TOKENS ── */
:root {
  --bg:          #060610;
  --surface:     rgba(255,255,255,0.035);
  --surface2:    rgba(255,255,255,0.065);
  --border:      rgba(255,255,255,0.08);
  --border2:     rgba(255,255,255,0.14);

  /* Gen Z palette — violet + mint + soft pink */
  --v1:   #9b5de5;   /* violet */
  --v2:   #c77dff;   /* soft purple */
  --m1:   #00f5d4;   /* mint */
  --m2:   #00bbf9;   /* sky */
  --p1:   #f15bb5;   /* pink */
  --p2:   #fee440;   /* yellow */

  --glow-r:  #f15bb5;
  --glow-c:  #00f5d4;
  --glow-v:  #9b5de5;

  --text:   #f0ede8;
  --muted:  rgba(240,237,232,0.42);
  --font-d: 'ProductSans', sans-serif;
  --font-b: 'ProductSans', sans-serif;
  --radius: 20px;
  --ease:   cubic-bezier(.25,.46,.45,.94);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────
   AMBIENT BACKGROUND — aurora gradient
───────────────────────────────────────── */
.stars-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 90% 55% at 20% 10%, rgba(155,93,229,.10) 0%, transparent 65%),
    radial-gradient(ellipse 70% 45% at 80% 90%, rgba(0,245,212,.08) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 90% 15%, rgba(241,91,181,.07) 0%, transparent 65%);
}
.stars-bg::before, .stars-bg::after {
  content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 12% 18%, rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 8%, rgba(200,119,255,.30) 0%,transparent 100%),
    radial-gradient(1px 1px at 57% 22%, rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 79% 12%, rgba(0,245,212,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 45%, rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 5% 65%, rgba(241,91,181,.20) 0%,transparent 100%),
    radial-gradient(1.2px 1.2px at 44% 55%, rgba(255,255,255,.12) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 78%, rgba(255,255,255,.16) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 88%, rgba(0,187,249,.18) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 72%, rgba(255,255,255,.14) 0%,transparent 100%);
  animation: twinkle 7s ease-in-out infinite alternate;
}
.stars-bg::after {
  background-image:
    radial-gradient(1px 1px at 8% 28%, rgba(200,119,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 42%, rgba(0,245,212,.22) 0%,transparent 100%),
    radial-gradient(1px 1px at 62% 15%, rgba(255,255,255,.14) 0%,transparent 100%),
    radial-gradient(1.2px 1.2px at 74% 62%, rgba(241,91,181,.16) 0%,transparent 100%),
    radial-gradient(1px 1px at 95% 30%, rgba(155,93,229,.18) 0%,transparent 100%);
  animation-delay: -3.5s;
}
@keyframes twinkle {
  0%   { opacity:.5; transform:scale(1); }
  100% { opacity:1;  transform:scale(1.01); }
}

/* floating orbs */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none;
  filter: blur(70px); opacity: 0; z-index: 0;
  animation: orbFloat 18s ease-in-out infinite;
}
.orb-1 {
  width:300px; height:300px;
  background: radial-gradient(circle, rgba(155,93,229,.18), transparent 70%);
  top:-100px; left:-100px;
  animation-delay: 0s;
}
.orb-2 {
  width:250px; height:250px;
  background: radial-gradient(circle, rgba(0,245,212,.14), transparent 70%);
  bottom:-80px; right:-80px;
  animation-delay: -6s;
}
.orb-3 {
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(241,91,181,.12), transparent 70%);
  top:50%; left:60%;
  animation-delay: -12s;
}
@keyframes orbFloat {
  0%,100% { opacity:.6; transform:translate(0,0) scale(1); }
  33%      { opacity:.9; transform:translate(30px,-20px) scale(1.05); }
  66%      { opacity:.5; transform:translate(-20px,30px) scale(.95); }
}

/* ── PAGE 1 ── */
#page1 {
  position:relative; z-index:1;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 20px; gap:0;
}

/* subtle top label */
.page-eyebrow {
  font-size:10px; font-weight:400; letter-spacing:.3em;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:28px;
  display:flex; align-items:center; gap:8px;
  animation: fadeUp .8s var(--ease) .2s both;
}
.page-eyebrow::before, .page-eyebrow::after {
  content:''; display:block; width:24px; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.25));
}
.page-eyebrow::after { transform: scaleX(-1); }

/* TAMBAHKAN DI BAGIAN CSS */
#suratin.clicked {
  pointer-events: none !important;
  cursor: default !important;
  opacity: 0.6 !important;
  filter: grayscale(0.3) brightness(0.85) !important;
  transform: scale(0.97) !important;
  box-shadow: 0 0 20px rgba(155,93,229,0.1) !important;
}

#suratin.clicked::before {
  opacity: 0.2 !important;
  animation-duration: 8s !important;
}
    
/* avatar / suratin */
#suratin {
  cursor:pointer;
  width:116px; height:116px;
  border-radius:50%;
  border:1.5px solid transparent;
  background-clip:padding-box;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  margin-bottom:12px;
  transition: transform .4s var(--ease), box-shadow .4s var(--ease);
  animation: fadeUp .8s var(--ease) .4s both;
}
/* rainbow ring */
#suratin::before {
  content:'';
  position:absolute; inset:-2px; border-radius:50%; z-index:-1;
  background: conic-gradient(from 0deg, var(--v1), var(--m1), var(--p1), var(--v2), var(--m2), var(--v1));
  animation: ringRotate 4s linear infinite;
  opacity:0.6;
}
@keyframes ringRotate { to { transform:rotate(360deg); } }
#suratin::after {
  content:'';
  position:absolute; inset:2px; border-radius:50%; z-index:0;
  background: var(--bg);
}
#suratin img {
  width:calc(100% - 4px); height:calc(100% - 4px);
  object-fit:cover; border-radius:50%;
  position:relative; z-index:1;
    pointer-events: auto;
  cursor: pointer;
}
#suratin:hover {
  transform:scale(1.06) translateY(-2px);
  box-shadow: 0 0 30px rgba(155,93,229,.3), 0 0 60px rgba(0,245,212,.15), 0 16px 40px rgba(0,0,0,.4);
}
#suratin:hover::before { opacity:1; animation-duration:1.5s; }

/* pulse ring around avatar */
.pulse-ring {
  position:absolute;
  width:116px; height:116px; border-radius:50%;
  border:1px solid rgba(155,93,229,.3);
  animation:pulseRing 3s ease-out infinite;
  pointer-events:none; margin-bottom:12px;
}
.pulse-ring:nth-child(2) { animation-delay:.8s; border-color:rgba(0,245,212,.2); }
.pulse-ring:nth-child(3) { animation-delay:1.6s; border-color:rgba(241,91,181,.15); }
@keyframes pulseRing {
  0%   { transform:scale(1); opacity:.8; }
  100% { transform:scale(2.2); opacity:0; }
}

#ket {
  font-size:11px; font-weight:300; letter-spacing:.22em;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:36px;
  transition:opacity .5s;
  animation: fadeUp .8s var(--ease) .6s both;
}

/* ── CARD ── */
#Content {
  width:min(420px, 92vw);
  background: rgba(15,12,30,.7);
  border:1px solid var(--border2);
  border-radius:28px;
  backdrop-filter:blur(24px);
  padding:36px 28px 32px;
  text-align:center;
  opacity:0; transform:translateY(24px);
  transition:opacity .8s var(--ease), transform .8s var(--ease);
  display:none;
  position:relative;
  overflow:hidden;
}
/* card inner glow border */
#Content::before {
  content:'';
  position:absolute; inset:0; border-radius:28px;
  background: linear-gradient(135deg, rgba(155,93,229,.08), rgba(0,245,212,.05), rgba(241,91,181,.06));
  pointer-events:none;
}
#Content.visible { opacity:1; transform:translateY(0); }

/* stiker gif */
#bq > div {
  display:flex; justify-content:center; align-items:center;
  margin-bottom:12px;
}
#fotoakhir {
  width:160px; height:160px; object-fit:contain;
  filter:drop-shadow(0 4px 20px rgba(155,93,229,.3));
}
#fotoakhir2, #fotoakhir3, #fotoakhir4, #fotoakhir5 { display:none; }

/* kalimat utama — semua teks disembunyikan dulu kecuali pertanyaan awal */
#kalimat { font-family:var(--font-d); font-size:clamp(22px,5.5vw,30px); font-weight:300; line-height:1.45; background: linear-gradient(135deg, #fff 0%, var(--v2) 60%, var(--m1) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; position:relative; }
#pesanTolak { font-size:12.5px; font-weight:300; color:var(--p1); opacity:0; position:absolute; left:50%; transform:translateX(-50%) scale(0); white-space:nowrap; bottom:-22px; transition:all .5s var(--ease); }
#pesanTolak.show { opacity:1; transform:translateX(-50%) scale(1); }
#kalimatb, #kalimatc {
  font-size:13px;
  font-weight:300;
  color:var(--muted);
  line-height:1.35;
  margin-top:3px;
}

/* TEKS YANG MUNCUL BERTAHAP — AWALNYA SEMUA DISEMBUNYIKAN */
#kalimat2, #kalimat2b, #kalimatb2, #kalimatc2, #kalimatb3, #kalimatc3 {
  display: none;
}
#kalimat2 { font-family:var(--font-d); font-size:clamp(20px,5vw,27px); font-weight:300; background:linear-gradient(135deg,#fff,var(--m1) 80%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
#kalimatb2 { font-size:13.5px; font-weight:300; color:var(--muted); line-height:1.75; margin-top:6px; }
#kalimat2b { font-family:var(--font-d); font-size:clamp(20px,5vw,27px); font-weight:300; background:linear-gradient(135deg,#fff,var(--v2) 80%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
#kalimatb3 { font-size:13.5px; font-weight:300; color:var(--muted); line-height:1.75; margin-top:6px; }
#kalimatc3 { font-size:13.5px; font-weight:300; color:var(--muted); line-height:1.75; margin-top:6px; }
#kalimatc3 b { color:var(--p1); }
#ctimer { font-size:28px; font-weight:400; color:var(--p1); text-shadow:0 0 16px rgba(241,91,181,.5); }

/* ── BUTTONS ── */
#Tombol {
  display:none; gap:12px; justify-content:center;
  flex-wrap:wrap; margin-top:8px; opacity:0;
  transform:scale(.9);
  transition:opacity .55s var(--ease), transform .55s var(--ease);
}
#Tombol.visible { opacity:1; transform:scale(1); }

#By, #Bn, #Bn2 {
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:50px;
  font-family:var(--font-b); font-size:14px; font-weight:400;
  letter-spacing:.05em; text-decoration:none;
  transition:all .28s var(--ease); user-select:none;
}
#By {
  padding:13px 36px;
  background:linear-gradient(135deg, var(--v1), var(--m1));
  border:1px solid rgba(155,93,229,.4);
  color:#fff;
  box-shadow:0 0 24px rgba(155,93,229,.35), 0 4px 20px rgba(0,0,0,.3);
  position:relative; overflow:hidden;
}
#By::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  border-radius:50px;
}
#By:hover {
  background:linear-gradient(135deg, #b06ef0, #22f8de);
  box-shadow:0 0 40px rgba(155,93,229,.55), 0 6px 28px rgba(0,0,0,.35);
  transform:translateY(-2px) scale(1.03);
}
#Bn {
  padding:13px 26px;
  background:transparent;
  border:1.5px solid rgba(255,255,255,.12);
  color:rgba(240,237,232,.5);
}
#Bn:hover { border-color:rgba(241,91,181,.5); color:var(--p1); }
#Bn2 {
  display:none; border-radius:50px;
  border:1.5px solid rgba(241,91,181,.4);
  background:transparent; color:rgba(241,91,181,.7); font-size:13px;
}

/* ─────────────────────────────────────────
   PAGE 2 — FLOWER SCENE
───────────────────────────────────────── */
#flower-container {
   transition: opacity 0.7s ease;
  position:fixed; inset:0; z-index:999;
  background:var(--bg);
  display:none; align-items:flex-end; justify-content:center;
  overflow:hidden; perspective:1000px;
}
#flower-container.active { display:flex; }
#flower-container::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(0,245,212,.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 35% at 30% 0%,   rgba(155,93,229,.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 30% at 80% 10%,  rgba(241,91,181,.05) 0%, transparent 65%);
}

/* aurora shimmer on flower page */
#flower-container::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(to bottom, rgba(155,93,229,.04) 0%, transparent 50%);
  animation:auroraShimmer 8s ease-in-out infinite;
}
@keyframes auroraShimmer {
  0%,100% { opacity:.5; }
  50%      { opacity:1; }
}

/* flower-page header text */
.flower-text {
  position:absolute; top:13%; left:50%;
  transform:translateX(-50%);
  font-family:var(--font-d);
  font-size:clamp(17px,3.8vw,24px);
  font-weight:300; color:var(--text);
  text-align:center; white-space:nowrap;
  letter-spacing:.03em;
  animation: flowerTextEnter 1.8s ease-out both, cuteFlowerText 3.8s ease-in-out 1.8s infinite;
  z-index:20;
}
.flower-text span {
  display: block;
  white-space: normal;
  word-wrap: break-word;
  padding: 0 20px;
  max-width: 92vw;
}
@keyframes floatText {
  0%,100% { transform:translateX(-50%) translateY(0); }
  50%      { transform:translateX(-50%) translateY(-8px); }
}
@keyframes typing   { from{width:0} to{width:100%} }
@keyframes blink-caret { 50%{border-color:transparent} }
@keyframes hide-caret  { to{border-right:none} }

    @keyframes cuteFlowerText {
  0%, 100% {
    transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
    text-shadow: 0 0 10px rgba(255,255,255,.25);
  }
  35% {
    transform: translateX(-50%) translateY(-8px) scale(1.04) rotate(-1deg);
    text-shadow: 0 0 18px rgba(241,91,181,.55);
  }
  70% {
    transform: translateX(-50%) translateY(-3px) scale(1.02) rotate(1deg);
    text-shadow: 0 0 18px rgba(0,245,212,.45);
  }
}

    @keyframes flowerTextEnter {
  0% {
    opacity: 0;
    transform: translateX(-50%) translateY(35px) scale(.9);
    filter: blur(10px);
  }
  60% {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px) scale(1.04);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
    filter: blur(0);
  }
}

/* floating hearts on flower page */
.heart-float {
  position:absolute; pointer-events:none; z-index:5;
  font-size:18px; opacity:0;
  animation:heartRise 6s ease-in infinite;
}
@keyframes heartRise {
  0%   { transform:translateY(0) rotate(-5deg);  opacity:0; }
  10%  { opacity:.8; }
  80%  { opacity:.4; }
  100% { transform:translateY(-80vh) rotate(10deg); opacity:0; }
}

/* sparkle dots */
.sparkle {
  position:absolute; border-radius:50%; pointer-events:none; z-index:4;
  background:radial-gradient(circle,rgba(200,119,255,.8),transparent 70%);
  animation:sparklePop 4s ease-in-out infinite;
}
@keyframes sparklePop {
  0%,100% { transform:scale(0); opacity:0; }
  30%      { transform:scale(1.5); opacity:.8; }
  60%      { transform:scale(.8); opacity:.4; }
}

/* night / star layer */
.night {
  position:fixed; left:50%; top:0; transform:translateX(-50%);
  width:100%; height:100%; filter:blur(.1vmin);
  background-image:
    radial-gradient(ellipse at top,   transparent 0%, #060610),
    radial-gradient(ellipse at bottom, #060610, rgba(0,245,212,.07)),
    repeating-linear-gradient(220deg, black 0px,black 19px, transparent 19px,transparent 22px),
    repeating-linear-gradient(189deg, black 0px,black 19px, transparent 19px,transparent 22px),
    repeating-linear-gradient(148deg, black 0px,black 19px, transparent 19px,transparent 22px),
    linear-gradient(90deg, rgba(155,93,229,.07), rgba(0,245,212,.05));
}

/* ─────────────────────────────────────────
   FLOWER CSS — palette updated to Gen-Z teal/violet
   (structure preserved, only colors upgraded)
───────────────────────────────────────── */
.flowers { position:relative; transform:scale(0.78); }

.flower {
  position:absolute; bottom:10vmin;
  transform-origin:bottom center;
  z-index:10; --fl-speed:0.8s;
}
.flower--1 { animation:moving-flower-1 5s ease-in-out infinite; }
.flower--1 .flower__line { height:70vmin; animation-delay:.3s; }
.flower--1 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.6s backwards; }
.flower--1 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.4s backwards; }
.flower--1 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
.flower--1 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
.flower--1 .flower__line__leaf--5 { animation:blooming-leaf-right var(--fl-speed) 1.8s backwards; }
.flower--1 .flower__line__leaf--6 { animation:blooming-leaf-left  var(--fl-speed) 2.0s backwards; }
.flower--2 { left:50%; transform:rotate(20deg); animation:moving-flower-2 6s ease-in-out infinite; }
.flower--2 .flower__line { height:60vmin; animation-delay:.6s; }
.flower--2 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.9s backwards; }
.flower--2 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.7s backwards; }
.flower--2 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
.flower--2 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.3s backwards; }
.flower--3 { left:50%; transform:rotate(-15deg); animation:moving-flower-3 4.5s ease-in-out infinite; }
.flower--3 .flower__line { animation-delay:.9s; }
.flower--3 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 2.5s backwards; }
.flower--3 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 2.3s backwards; }
.flower--3 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
.flower--3 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

.flower__leafs { position:relative; animation:blooming-flower 2s backwards; }
.flower__leafs--1 { animation-delay:1.1s; }
.flower__leafs--2 { animation-delay:1.4s; }
.flower__leafs--3 { animation-delay:1.7s; }
.flower__leafs::after {
  content:""; position:absolute; left:0; top:0;
  transform:translate(-50%,-100%);
  width:8vmin; height:8vmin;
  background-color:var(--m1); filter:blur(10vmin);
}
.flower__leaf {
  position:absolute; bottom:0; left:50%;
  width:8vmin; height:11vmin;
  border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
  background-color:#b5ffee;
  background-image:linear-gradient(to top, #00a896, #b5ffee);
  transform-origin:bottom center; opacity:.92;
  box-shadow:inset 0 0 2vmin rgba(255,255,255,.5);
}
.flower__leaf--1 { transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
.flower__leaf--2 { transform:translate(-50%,-4%) rotateX(40deg); }
.flower__leaf--3 { transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
.flower__leaf--4 {
  width:8vmin; height:8vmin; transform-origin:bottom left;
  border-radius:4vmin 10vmin 4vmin 4vmin;
  transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);
  background-image:linear-gradient(to top, var(--m2), #b5ffee);
  z-index:1; opacity:.8;
}
.flower__white-circle {
  position:absolute; left:-3.5vmin; top:-3vmin;
  width:9vmin; height:4vmin; border-radius:50%;
  background-color:#fff;
}
.flower__white-circle::after {
  content:""; position:absolute; left:50%; top:45%;
  transform:translate(-50%,-50%);
  width:60%; height:60%; border-radius:inherit;
  background-image:linear-gradient(90deg, #ffe066, #fee440);
}
.flower__line {
  height:55vmin; width:1.5vmin;
  background-image:
    linear-gradient(to left, rgba(0,0,0,.2), transparent, rgba(255,255,255,.2)),
    linear-gradient(to top, transparent 10%, #007a70, #00c9a7);
  box-shadow:inset 0 0 2px rgba(0,0,0,.5);
  animation:grow-flower-tree 4s backwards;
}
.flower__line__leaf {
  --w:7vmin; --h:calc(var(--w)+2vmin);
  position:absolute; top:20%; left:90%;
  width:var(--w); height:var(--h);
  border-top-right-radius:var(--h); border-bottom-left-radius:var(--h);
  background-image:linear-gradient(to top, rgba(0,122,112,.4), #00c9a7);
}
.flower__line__leaf--1 { transform:rotate(70deg) rotateY(30deg); }
.flower__line__leaf--2 { top:45%; transform:rotate(70deg) rotateY(30deg); }
.flower__line__leaf--3,
.flower__line__leaf--4,
.flower__line__leaf--6 {
  border-top-right-radius:0; border-bottom-left-radius:0;
  border-top-left-radius:var(--h); border-bottom-right-radius:var(--h);
  left:-460%; top:12%; transform:rotate(-70deg) rotateY(30deg);
}
.flower__line__leaf--4 { top:40%; }
.flower__line__leaf--5 { top:0; transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(.6); }
.flower__line__leaf--6 { top:-2%; left:-450%; transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(.6); }

.flower__light {
  position:absolute; bottom:0; width:1vmin; height:1vmin;
  background-color:#ffe066; border-radius:50%;
  filter:blur(.2vmin);
  animation:light-ans 4s ease-in-out infinite backwards;
}
.flower__light:nth-child(odd) { background-color:var(--m1); }
.flower__light--1 { left:-2vmin; animation-delay:1.0s; }
.flower__light--2 { left: 3vmin; animation-delay: .5s; }
.flower__light--3 { left:-6vmin; animation-delay: .3s; }
.flower__light--4 { left: 6vmin; animation-delay: .9s; }
.flower__light--5 { left:-1vmin; animation-delay:1.5s; }
.flower__light--6 { left:-4vmin; animation-delay:3.0s; }
.flower__light--7 { left: 3vmin; animation-delay:2.0s; }
.flower__light--8 { left:-6vmin; animation-delay:3.5s; }

/* ─── GRASS — fully proper, not straight lines ─── */
.flower__grass {
  --c:#00a896; --line-w:1.5vmin;
  position:absolute; bottom:12vmin; left:-7vmin;
  display:flex; flex-direction:column; align-items:flex-end;
  z-index:20; transform-origin:bottom center;
  transform:rotate(-48deg) rotateY(40deg);
}
.flower__grass--1 { animation:moving-grass 3.5s ease-in-out infinite; }
.flower__grass--2 {
  left:2vmin; bottom:10vmin;
  transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
  opacity:.8; z-index:0;
  animation:moving-grass--2 4s ease-in-out infinite;
}
/* curved grass top (arc shape, not just a line) */
.flower__grass--top {
  width:7vmin; height:10vmin;
  border-top-right-radius:80%;
  border-right:var(--line-w) solid var(--c);
  transform-origin:bottom center; transform:rotate(-2deg);
  /* add slight curve with box shadow to avoid flat line look */
  box-shadow: 1px 0 0 rgba(0,0,0,.2);
}
/* tapered stem — polygon so it narrows upward, never a single flat line */
.flower__grass--bottom {
  margin-top:-2px;
  width:var(--line-w); height:25vmin;
  background-image:linear-gradient(to top, transparent 5%, var(--c) 30%, #00f5d4 100%);
  clip-path:polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
}
.flower__grass__leaf {
  --size:10vmin; position:absolute;
  width:calc(var(--size)*2.1); height:var(--size);
  border-top-left-radius:var(--size); border-top-right-radius:var(--size);
  background-image:linear-gradient(to top, transparent, transparent 30%, var(--c));
  z-index:100;
}
.flower__grass__leaf--1 { top:-6%;  left:30%;   --size:6vmin;  transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
.flower__grass__leaf--2 { top:-5%;  left:-110%; --size:6vmin;  transform:rotate(10deg);  animation:growing-grass-ans--2 2s 2.4s linear backwards; }
.flower__grass__leaf--3 { top:5%;   left:60%;   --size:8vmin;  transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
.flower__grass__leaf--4 { top:6%;   left:-135%; --size:8vmin;  transform:rotate(2deg);   animation:growing-grass-ans--4 2s 2.0s linear backwards; }
.flower__grass__leaf--5 { top:20%;  left:60%;   --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
.flower__grass__leaf--6 { top:22%;  left:-180%; --size:10vmin; transform:rotate(10deg);  animation:growing-grass-ans--6 2s 1.6s linear backwards; }
.flower__grass__leaf--7 { top:39%;  left:70%;   --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
.flower__grass__leaf--8 { top:40%;  left:-215%; --size:11vmin; transform:rotate(10deg);  animation:growing-grass-ans--8 2s 1.2s linear backwards; }
.flower__grass__overlay {
  position:absolute; top:-10%; right:0; width:100%; height:100%;
  background-color:rgba(0,0,0,.55); filter:blur(1.5vmin); z-index:100;
}

/* ─── g-long: proper leaf/stem, polygon ensures visible body ─── */
.flower__g-long {
  --w:2vmin; --h:6vmin; --c:#00a896;
  position:absolute; bottom:10vmin; left:-3vmin;
  transform-origin:bottom center;
  transform:rotate(-30deg) rotateY(-20deg);
  display:flex; flex-direction:column; align-items:flex-end;
  animation:flower-g-long-ans 4s ease-in-out infinite;
}
.flower__g-long__top {
  top:calc(var(--h)*-1);
  width:calc(var(--w)+1vmin); height:var(--h);
  border-top-right-radius:100%;
  border-right:.7vmin solid var(--c);
  transform:translate(-.7vmin,1vmin);
}
/* polygon tapered stem so it's never a single pixel line */
.flower__g-long__bottom {
  width:var(--w); height:50vmin;
  transform-origin:bottom center;
  background-image:linear-gradient(to top, transparent 20%, var(--c) 60%, #00f5d4 100%);
  box-shadow:inset 0 0 2px rgba(0,0,0,.5);
  clip-path:polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
}

/* ─── g-right big leaves ─── */
.flower__g-right {
  position:absolute; bottom:6vmin; left:-2vmin;
  transform-origin:bottom left; transform:rotate(20deg);
}
.flower__g-right .leaf {
  width:30vmin; height:50vmin; border-top-left-radius:100%;
  border-left:2vmin solid #00897b;
  background-image:linear-gradient(to bottom, transparent, #060610 60%);
  -webkit-mask-image:linear-gradient(to top, transparent 30%, #00897b 60%);
  mask-image:linear-gradient(to top, transparent 30%, #00897b 60%);
}
.flower__g-right--1 { animation:flower-g-right-ans 4s ease-in-out infinite; }
.flower__g-right--2 { left:5vmin; transform:rotateY(-180deg); animation:flower-g-right-ans--2 5s ease-in-out infinite; }
.flower__g-right--2 .leaf { height:75vmin; filter:blur(.3vmin); opacity:.8; }

/* ─── g-front small front plant ─── */
.flower__g-front {
  position:absolute; bottom:6vmin; left:2.5vmin; z-index:100;
  transform-origin:bottom center;
  transform:rotate(-28deg) rotateY(30deg) scale(1.04);
  animation:flower__g-front-ans 4s ease-in-out infinite;
}
/* front line: visible tapered shape */
.flower__g-front__line {
  width:.5vmin; height:20vmin; position:relative;
  background-image:linear-gradient(to top, transparent 5%, #00897b 40%, #00f5d4 100%);
  clip-path:polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
}
.flower__g-front__leaf-wrapper {
  position:absolute; top:0; left:0;
  transform-origin:bottom left; transform:rotate(10deg);
}
.flower__g-front__leaf-wrapper:nth-child(even) { left:0; transform:rotateY(-180deg) rotate(5deg); animation:flower__g-front__leaf-left-ans 1s ease-in backwards; }
.flower__g-front__leaf-wrapper:nth-child(odd)  { animation:flower__g-front__leaf-ans 1s ease-in backwards; }
.flower__g-front__leaf-wrapper--1 { top:-8vmin; transform:scale(.7);                        animation:flower__g-front__leaf-ans       1s 5.5s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--2 { top:-8vmin; transform:rotateY(-180deg) scale(.7) !important; animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--3 { top:-3vmin; animation:flower__g-front__leaf-ans 1s 4.6s ease-in backwards; }
.flower__g-front__leaf-wrapper--4 { top:-3vmin; transform:rotateY(-180deg) scale(.9) !important; animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
.flower__g-front__leaf-wrapper--5,.flower__g-front__leaf-wrapper--6 { top:2vmin; }
.flower__g-front__leaf-wrapper--7,.flower__g-front__leaf-wrapper--8 { top:6.5vmin; }
.flower__g-front__leaf-wrapper--2 { animation-delay:5.2s !important; }
.flower__g-front__leaf-wrapper--3 { animation-delay:4.9s !important; }
.flower__g-front__leaf-wrapper--5 { animation-delay:4.3s !important; }
.flower__g-front__leaf-wrapper--6 { animation-delay:4.1s !important; }
.flower__g-front__leaf-wrapper--7 { animation-delay:3.8s !important; }
.flower__g-front__leaf-wrapper--8 { animation-delay:3.5s !important; }
.flower__g-front__leaf {
  width:10vmin; height:10vmin;
  border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
  box-shadow:inset 0 2px 1vmin rgba(0,245,212,.2);
  background-image:
    linear-gradient(to bottom left, transparent, #060610),
    linear-gradient(to bottom right, #00c9a7 50%, transparent 50%);
  -webkit-mask-image:linear-gradient(to bottom right, #00a896 50%, transparent 50%);
  mask-image:linear-gradient(to bottom right, #00a896 50%, transparent 50%);
}

/* ─── g-fr side leaf cluster ─── */
.flower__g-fr {
  position:absolute; bottom:-4vmin; left:0;
  transform-origin:bottom left; z-index:10;
  animation:flower__g-fr-ans 3.5s ease-in-out infinite;
}
.flower__g-fr .leaf {
  width:30vmin; height:50vmin; border-top-left-radius:100%;
  border-left:2vmin solid #00897b;
  -webkit-mask-image:linear-gradient(to top, transparent 25%, #00897b 50%);
  mask-image:linear-gradient(to top, transparent 25%, #00897b 50%);
  position:relative; z-index:1;
}
.flower__g-fr__leaf {
  position:absolute; top:0; left:0;
  width:10vmin; height:10vmin;
  border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
  box-shadow:inset 0 2px 1vmin rgba(0,245,212,.2);
  background-image:
    linear-gradient(to bottom left, transparent, #060610 98%),
    linear-gradient(to bottom right, #00f5d4 45%, transparent 50%);
  -webkit-mask-image:linear-gradient(135deg, #00a896 40%, transparent 50%);
  mask-image:linear-gradient(135deg, #00a896 40%, transparent 50%);
}
.flower__g-fr__leaf--1 { left:20vmin; transform:rotate(45deg);               animation:flower__g-fr-leaft-ans-1 .5s 5.2s linear backwards; }
.flower__g-fr__leaf--2 { left:12vmin; top:-7vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 5.0s linear backwards; }
.flower__g-fr__leaf--3 { left:15vmin; top:6vmin;  transform:rotate(55deg);               animation:flower__g-fr-leaft-ans-5 .5s 4.8s linear backwards; }
.flower__g-fr__leaf--4 { left:6vmin;  top:-2vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 4.6s linear backwards; }
.flower__g-fr__leaf--5 { left:10vmin; top:14vmin; transform:rotate(55deg);               animation:flower__g-fr-leaft-ans-5 .5s 4.4s linear backwards; }
.flower__g-fr__leaf--6 { left:0;      top:6vmin;  transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 .5s 4.2s linear backwards; }
.flower__g-fr__leaf--7 { left:5vmin;  top:22vmin; transform:rotate(45deg);               animation:flower__g-fr-leaft-ans-7 .5s 4.0s linear backwards; }

/* grow-ans wrapper */
.grow-ans {
  animation:grow-ans 2s var(--d,0s) backwards;
  transform-origin:bottom center;
}
@keyframes grow-ans {
  0% { transform:scaleY(0); opacity:0; }
}

/* ─── long-g blade grass cluster — each blade is a rounded oval, not a line ─── */
.long-g {
  position:absolute; bottom:10vmin;
  display:flex; gap:3px; align-items:flex-end;
}
.long-g--0 { left:-5vmin; }
.long-g--1 { left: 3vmin; }
.long-g--2 { left:-12vmin; }
.long-g--3 { left: 8vmin; }
.long-g--4 { left:-18vmin; }
.long-g--5 { left: 15vmin; }
.long-g--6 { left:-22vmin; }
.long-g--7 { left: 20vmin; }

/* grass blade: oval body so it never looks like just a straight line */
.leaf {
  width:3vmin; height:16vmin;
  background-image:linear-gradient(to top, transparent 5%, #007a70 35%, #00c9a7 75%, #00f5d4 100%);
  border-radius:50% 50% 20% 20%;   /* wide oval top, narrower base */
  transform-origin:bottom center;
  will-change:transform;
  box-shadow:inset -1px 0 2px rgba(0,0,0,.2), inset 1px 0 2px rgba(255,255,255,.1);
}
.leaf--0 { animation:leaf-sway-0 3.8s ease-in-out infinite; }
.leaf--1 { animation:leaf-sway-1 4.2s ease-in-out infinite .4s; }
.leaf--2 { animation:leaf-sway-2 3.5s ease-in-out infinite .8s; }
.leaf--3 { animation:leaf-sway-3 4.8s ease-in-out infinite .2s; }
@keyframes leaf-sway-0 {
  0%,100% { transform:rotate(-5deg); }
  40%     { transform:rotate(-2deg) scaleX(1.03); }
  65%     { transform:rotate(-8deg) scaleX(0.97); }
}
@keyframes leaf-sway-1 {
  0%,100% { transform:rotate(10deg)  scaleX(.72); }
  40%     { transform:rotate(13deg)  scaleX(.74); }
  65%     { transform:rotate(7deg)   scaleX(.68); }
}
@keyframes leaf-sway-2 {
  0%,100% { transform:rotate(-14deg) scaleX(.8); }
  40%     { transform:rotate(-11deg) scaleX(.82); }
  65%     { transform:rotate(-17deg) scaleX(.77); }
}
@keyframes leaf-sway-3 {
  0%,100% { transform:rotate(19deg)  scaleX(.62); }
  40%     { transform:rotate(22deg)  scaleX(.64); }
  65%     { transform:rotate(16deg)  scaleX(.58); }
}

.growing-grass { position:absolute; bottom:0; }

/* ─── ALL KEYFRAMES ─── */
@keyframes blooming-flower {
  0%   { transform:scale(0); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}
@keyframes blooming-leaf-right {
  0%   { transform:rotate(70deg)  rotateY(30deg) scale(0); }
  100% { transform:rotate(70deg)  rotateY(30deg) scale(1); }
}
@keyframes blooming-leaf-left {
  0%   { transform:rotate(-70deg) rotateY(30deg) scale(0); }
  100% { transform:rotate(-70deg) rotateY(30deg) scale(1); }
}
@keyframes grow-flower-tree {
  0%   { height:0; }
  100% { height:55vmin; }
}
@keyframes light-ans {
  0%,100% { transform:translateY(0); opacity:1; }
  50%     { transform:translateY(-5vmin); opacity:.5; }
}
@keyframes moving-flower-1 {
  0%,100% { transform:translateX(0) rotate(0deg); }
  50%     { transform:translateX(2vmin) rotate(2deg); }
}
@keyframes moving-flower-2 {
  0%,100% { transform:translateX(0) rotate(20deg); }
  50%     { transform:translateX(-2vmin) rotate(18deg); }
}
@keyframes moving-flower-3 {
  0%,100% { transform:translateX(0) rotate(-15deg); }
  50%     { transform:translateX(2vmin) rotate(-17deg); }
}
@keyframes moving-grass {
  0%   { transform:rotate(-48deg) rotateY(40deg); }
  25%  { transform:rotate(-46deg) rotateY(38deg); }
  50%  { transform:rotate(-51deg) rotateY(42deg); }
  75%  { transform:rotate(-47deg) rotateY(39deg); }
  100% { transform:rotate(-48deg) rotateY(40deg); }
}
@keyframes moving-grass--2 {
  0%   { transform:scale(.5) rotate(75deg)    rotateX(10deg)  rotateY(-200deg); }
  25%  { transform:scale(.5) rotate(74deg)    rotateX(9deg)   rotateY(-200deg); }
  50%  { transform:scale(.5) rotate(77deg)    rotateX(11deg)  rotateY(-200deg); }
  75%  { transform:scale(.5) rotate(75.5deg)  rotateX(10deg)  rotateY(-200deg); }
  100% { transform:scale(.5) rotate(75deg)    rotateX(10deg)  rotateY(-200deg); }
}
@keyframes flower-g-long-ans {
  0%   { transform:rotate(-30deg) rotateY(-20deg); }
  30%  { transform:rotate(-28.5deg) rotateY(-19deg); }
  60%  { transform:rotate(-32deg) rotateY(-21deg); }
  100% { transform:rotate(-30deg) rotateY(-20deg); }
}
@keyframes flower-g-right-ans {
  0%   { transform:rotate(20deg); }
  30%  { transform:rotate(21.5deg) rotateX(-10deg); }
  60%  { transform:rotate(23deg)   rotateX(-20deg); }
  100% { transform:rotate(20deg); }
}
@keyframes flower-g-right-ans--2 {
  0%   { transform:rotateY(-180deg) rotate(0deg)  rotateX(-20deg); }
  30%  { transform:rotateY(-180deg) rotate(2deg)  rotateX(-18deg); }
  60%  { transform:rotateY(-180deg) rotate(5deg)  rotateX(-22deg); }
  100% { transform:rotateY(-180deg) rotate(0deg)  rotateX(-20deg); }
}
@keyframes flower__g-front-ans {
  0%   { transform:rotate(-28deg) rotateY(30deg) scale(1.04); }
  30%  { transform:rotate(-26deg) rotateY(28deg) scale(1.04); }
  60%  { transform:rotate(-31deg) rotateY(33deg) scale(1.04); }
  100% { transform:rotate(-28deg) rotateY(30deg) scale(1.04); }
}
@keyframes flower__g-fr-ans {
  0%   { transform:rotate(2deg); }
  30%  { transform:rotate(1deg); }
  60%  { transform:rotate(3.5deg); }
  100% { transform:rotate(2deg); }
}
@keyframes flower__g-front__leaf-ans       { 0% { transform:rotate(10deg) scale(0); } }
@keyframes flower__g-front__leaf-left-ans  { 0% { transform:rotateY(-180deg) rotate(5deg) scale(0); } }
@keyframes flower__g-front__leaf-left-ans-2{ 0% { transform:rotateY(-180deg) scale(0); } }
@keyframes flower__g-fr-leaft-ans-1 { 0% { transform-origin:left; transform:rotate(45deg) scale(0); } }
@keyframes flower__g-fr-leaft-ans-5 { 0% { transform-origin:left; transform:rotate(55deg) scale(0); } }
@keyframes flower__g-fr-leaft-ans-6 { 0% { transform-origin:right; transform:rotate(25deg) rotateY(-180deg) scale(0); } }
@keyframes flower__g-fr-leaft-ans-7 { 0% { transform-origin:left; transform:rotate(45deg) scale(0); } }
@keyframes growing-grass-ans--1 { 0% { transform-origin:bottom left;  transform:rotate(-20deg) scale(0); } }
@keyframes growing-grass-ans--2 { 0% { transform-origin:bottom right; transform:rotate(10deg)  scale(0); } }
@keyframes growing-grass-ans--3 { 0% { transform-origin:bottom left;  transform:rotate(-18deg) rotateX(-20deg) scale(0); } }
@keyframes growing-grass-ans--4 { 0% { transform-origin:bottom right; transform:rotate(2deg)   scale(0); } }
@keyframes growing-grass-ans--5 { 0% { transform-origin:bottom left;  transform:rotate(-24deg) rotateX(-20deg) scale(0); } }
@keyframes growing-grass-ans--6 { 0% { transform-origin:bottom right; transform:rotate(10deg)  scale(0); } }
@keyframes growing-grass-ans--7 { 0% { transform-origin:bottom left;  transform:rotate(-10deg) scale(0); } }
@keyframes growing-grass-ans--8 { 0% { transform-origin:bottom right; transform:rotate(10deg)  scale(0); } }

/* ─── BOUNCE avatar ─── */
.bounce { animation:bounce 1s; }
@keyframes bounce {
  0%,20%,50%,80%,100% { transform:translateY(0); }
  40%  { transform:translateY(-28px); }
  60%  { transform:translateY(-12px); }
}

/* ─── FADE UP helper ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── PAGE TRANSITION ─── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#flower-container.active { animation:fadeIn .7s ease forwards; }

/* ─── SWAL dark / Gen-Z override ─── */
.swal2-popup {

function burstHearts(origin) {
  const rect = origin.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  const symbols = ['♡', '✦', '✧', '❀', '✿'];
  const colors = ['#f15bb5', '#c77dff', '#00f5d4', '#fee440', '#ffffff'];

  for (let i = 0; i < 18; i++) {
    const particle = document.createElement('span');
    const angle = (Math.PI * 2 * i) / 18;
    const distance = 38 + Math.random() * 54;
    particle.className = 'click-burst';
    particle.textContent = symbols[i % symbols.length];
    particle.style.setProperty('--x', `${x}px`);
    particle.style.setProperty('--y', `${y}px`);
    particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
    particle.style.setProperty('--dy', `${Math.sin(angle) * distance - 28}px`);
    particle.style.setProperty('--r', `${-35 + Math.random() * 70}deg`);
    particle.style.setProperty('--s', `${12 + Math.random() * 9}px`);
    particle.style.setProperty('--c', colors[i % colors.length]);
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 950);
  }

  el.style.transition = 'opacity .5s ease, transform .5s ease';
  el.style.opacity = '0';
  el.style.transform = 'scale(.1)';
}

/* ── BUKA SURAT ── */
function memulai() {
  if (isProfileClicked) return;
  isProfileClicked = true;
  const suratin = document.getElementById('suratin');
  suratin.classList.add('clicked');
  suratin.classList.add('bounce');
      // Efek tambahan: scale + shadow + ring
    suratin.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease';
    suratin.style.transform = 'scale(0.95)';
    setTimeout(() => {
      suratin.style.transform = 'scale(1)';
    }, 100);
    
    // Efek ring berkedip cepat
    const rings = document.querySelectorAll('.pulse-ring');
    rings.forEach(ring => {
      ring.style.animation = 'none';
      ring.offsetHeight; // force reflow
      ring.style.animation = 'pulseRing 0.6s ease-out 2';
    });
  
   suratin.style.pointerEvents = 'none'; 
 suratin.style.cursor = 'default';
  suratin.style.opacity = '0.7';
  suratin.style.filter = 'grayscale(0.2) brightness(0.9)';
  
  setTimeout(() => {
        // Animasi hilang teks "klik profil aku" yang lucu
    const ketEl = document.getElementById('ket');
    ketEl.style.transition = 'all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
    ketEl.style.opacity = '0';
    ketEl.style.transform = 'translateY(-20px) scale(0.5) rotate(-10deg)';
    ketEl.style.letterSpacing = '10px';
    setTimeout(() => {
      ketEl.style.display = 'none';
    }, 500);

    const content = document.getElementById('Content');
    content.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => content.classList.add('visible')));
        // Animasi masuk card yang lucu (bounce)
    content.style.transform = 'scale(0.7) translateY(50px)';
    content.style.transition = 'all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
    setTimeout(() => {
      content.style.transform = 'scale(1) translateY(0)';
      content.style.opacity = '1';
    }, 50);

    const foto = document.getElementById('fotoakhir');
    foto.style.display = 'block';
    foto.style.opacity = '0';
    foto.style.transform = 'scale(.1)';
    foto.style.transition = 'opacity .7s ease, transform .7s ease';
    setTimeout(() => ftmuncul(), 300);

    setTimeout(() => {
      const T = document.getElementById('Tombol');
      T.style.display = 'flex';
      requestAnimationFrame(() => requestAnimationFrame(() => T.classList.add('visible')));
      ftom = 1;
    }, 600);
  }, 900);
}
